# =============================================================================
# C2 服务端配置（与 internal/config 中字段对应）
# -----------------------------------------------------------------------------
# 放置位置：须位于进程「当前工作目录」下。部署时请在放有本文件的目录中启动程序，例如：
#   cd /opt/c2 && ./c2-server-linux
# 修改本文件后需要重启服务端进程才会生效。
# =============================================================================

server:
  # HTTP 管理面板 + WebSocket（如 /ws/agent）监听地址。
  # - ":8080"：所有网卡上监听 8080，局域网/公网可访问（需在防火墙/安全组放行该端口）。
  # - "127.0.0.1:8080"：仅本机能打开面板。
  addr: ":8080"

  # 可选。下发给远端 Agent 连接 Web 时使用的主机名或 IP（不含端口，端口仍用上面 addr 里的端口）。
  # 公网肉鸡填公网 IP 或域名；纯内网可填内网 IP。不填则按监听器外网地址、浏览器访问 Host 等自动推断。
  # 不要填 0.0.0.0。不需要可整行删除或留空字符串。
  # public_host: ""

auth:
  # 登录 Web 面板的密码；生产环境务必改成强密码并限制配置文件权限。
  login_password: "change_me"

  # JWT 密钥，务必改为足够长的随机字符串；泄露会导致会话可被伪造。改后已登录用户需重新登录。
  jwt_secret: "replace_with_a_secure_random_secret"

database:
  # SQLite 库文件路径（相对启动时工作目录，也可用绝对路径）。可拷贝此文件迁移历史数据。
  path: "data/c2.db"

logging:
  # 日志级别，常用：debug / info / warn / error。
  level: "info"
